# Alembic configuration.
#
# Migrations are run from the `backend/` directory:
#
#     uv run alembic upgrade head                # apply all pending migrations
#     uv run alembic current                     # show current revision
#     uv run alembic stamp <revision>            # mark DB as being at <revision>
#                                                # without running any SQL
#     uv run alembic revision -m "what changed"  # new empty migration
#     uv run alembic revision --autogenerate -m "..." # diff models vs DB
#
# The DATABASE_URL env var is read at runtime in alembic/env.py — there is
# no sqlalchemy.url here on purpose so we never accidentally hard-code a
# connection string in source control.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Use UTC timestamps in the version filenames.
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
# ruff format on generated migration files keeps autogenerate output tidy
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

name: Quality Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/benchmarks/**"
      - "infra/scripts/eval/**"
      - ".github/workflows/quality-benchmarks.yml"
  push:
    branches: ["**"]
    paths:
      - "infra/benchmarks/**"
      - "infra/scripts/eval/**"
      - ".github/workflows/quality-benchmarks.yml"
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to test'
        required: false

jobs:
  quality-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run quality benchmark suite
        run: python infra/scripts/eval/eval_all.py

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-benchmark-reports
          path: infra/benchmarks/reports/*.json
